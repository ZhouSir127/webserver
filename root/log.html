<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>无人机地面控制站 - 系统登录</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #ffffff; /* 纯白背景 */
            background-image: radial-gradient(#e0e5ec 1px, transparent 1px);
            background-size: 20px 20px;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            color: #333333; 
        }
        .login-container { 
            background: #ffffff; 
            padding: 40px 35px; 
            border-radius: 8px; 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08); 
            width: 320px; 
            text-align: center; 
            border: 1px solid #eaeaea; 
        }
        .header-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }
        h2 { 
            color: #005a9e; 
            margin-top: 0;
            margin-bottom: 30px; 
            font-weight: 600; 
            letter-spacing: 1px; 
            font-size: 22px;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .input-group label {
            display: block;
            font-size: 13px;
            color: #666;
            margin-bottom: 5px;
            font-weight: 500;
        }
        input { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #cccccc; 
            border-radius: 4px; 
            box-sizing: border-box; 
            font-size: 14px; 
            background: #fdfdfd; 
            transition: all 0.3s ease; 
        }
        input:focus { 
            border-color: #0078d4; 
            box-shadow: 0 0 0 3px rgba(0, 120, 212, 0.1);
            outline: none; 
            background: #ffffff; 
        }
        button { 
            width: 100%; 
            padding: 12px; 
            background: #0078d4; 
            color: white; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            font-size: 15px; 
            font-weight: 600; 
            margin-top: 10px; 
            transition: background 0.2s, transform 0.1s; 
        }
        button:hover { 
            background: #005a9e; 
        }
        button:active { 
            transform: scale(0.98); 
        }
        .register-link { 
            text-decoration: none; 
            color: #555; 
            font-size: 13px; 
            display: inline-block; 
            margin-top: 25px; 
            transition: color 0.2s; 
        }
        .register-link:hover { 
            color: #0078d4; 
            text-decoration: underline; 
        }
        .error-msg {
            color: #d32f2f;
            font-size: 13px;
            margin-top: -10px;
            margin-bottom: 15px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="header-icon">🛸</div>
        <h2>GCS 身份验证</h2>
        
        <div id="errorBox" class="error-msg"></div>

        <form id="loginForm" onsubmit="event.preventDefault(); executeLogin();">
            <div class="input-group">
                <label for="user">操作员账号</label>
                <input type="text" id="user" name="user" placeholder="输入用户名" required autocomplete="off">
            </div>
            <div class="input-group">
                <label for="password">授权密码</label>
                <input type="password" id="password" name="password" placeholder="输入密码" required>
            </div>
            <button type="submit">建立连接</button>
        </form>
        
        <a href="/register" class="register-link">新操作员？点击注册系统权限</a>
    </div>

    <script>
        function executeLogin() {
            const form = document.getElementById('loginForm');
            const errorBox = document.getElementById('errorBox');
            const user = form.user.value.trim();
            const pass = form.password.value.trim();
            
            errorBox.style.display = 'none';

            if(!user || !pass) {
                showError('请输入完整的账号和密码');
                return;
            }

            // 使用空格拼接，完美适配后端的: iss >> name >> password;
            const payload = user + " " + pass;

            // 发送 POST 请求到 router.h 中定义的 /login 路由
            fetch('/login', {
                method: 'POST',
                body: payload
            })
            .then(res => {
                if (!res.ok) {
                    throw new Error(`HTTP 通信异常状态码: ${res.status}`);
                }
                return res.text();
            })
            .then(html => {
                // 如果后端返回的是错误页面的特征内容（可以根据你的 logError.html 内容调整判断词）
                if (html.includes("User Login Failed") || html.includes("logError")) {
                    showError("账号或密码错误，请重试");
                } else {
                    // 登录成功，重写当前文档
                    document.open();
                    document.write(html);
                    document.close();
                    
                    // 修改地址栏，让用户感觉已经进入了主页
                    window.history.pushState({}, "", "/index.html");
                }
            })
            .catch(err => {
                showError('服务器连接失败，请检查 C++ 后端是否运行');
                console.error(err);
            });
        }

        function showError(msg) {
            const errorBox = document.getElementById('errorBox');
            errorBox.textContent = msg;
            errorBox.style.display = 'block';
        }
    </script>
</body>
</html>
