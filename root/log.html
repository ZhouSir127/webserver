<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>无人机控制台 - 登录</title>
    <style>
        body { font-family: Arial, sans-serif; background: #2c3e50; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #ecf0f1; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); width: 300px; text-align: center; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #bdc3c7; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #2980b9; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; margin-top: 10px;}
        button:hover { background: #3498db; }
        a { text-decoration: none; color: #e74c3c; font-size: 14px; display: inline-block; margin-top: 15px;}
    </style>
</head>
<body>
    <div class="box">
        <h2>🚁 无人机系统登录</h2>
        <form id="loginForm" action="/login" method="post">
            <input type="text" name="user" placeholder="输入用户名" required>
            <input type="password" name="password" placeholder="输入密码" required>
            <button type="button" onclick="submitForm()">安全登录</button>
        </form>
        <a href="/r">还没有账号？点击注册</a>
    </div>

    <script>
        // 为了适配后端单纯的 "iss >> name >> password" 空格分割读取方式
        // 我们用 JS 拦截表单，将用户名和密码用空格拼接后发送 POST
        function submitForm() {
            const form = document.getElementById('loginForm');
            const user = form.user.value;
            const pass = form.password.value;
            if(!user || !pass) return alert('请输入账号和密码');

            fetch('/login', {
                method: 'POST',
                body: user + " " + pass
            }).then(res => {
                if(res.redirected) window.location.href = res.url;
                else document.write(res.text()); // 如果重定向失败，直接覆盖页面报错
            });
        }
    </script>
</body>
</html>
